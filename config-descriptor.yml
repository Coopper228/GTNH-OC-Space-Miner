# Web configurator descriptor for the GTNH Space Miner controller.
#
# Hosted at the repo root and fetched (raw) by the GTNH-OC-Web-Configurator:
#   https://navatusein.github.io/GTNH-OC-Web-Configurator/#/configurator?url=<raw url of this file>
#
# The site renders a form from `fieldGroups`, then substitutes the filled
# values into `configTemplate` wherever it finds <field>KEY</field>, and hands
# the user a ready /home/config.lua. Keep configTemplate in sync with config.lua.
descriptor:
  name: "GTNH Space Miner Controller"
  description: >-
    Configuration for the automated Space Elevator Space Miner controller.
    Hardware (miners, redstone I/O, ME interfaces, drone buffer) is auto-detected
    in-game, so only timings and ore targets are set here.
  repositoryLink: "https://github.com/YOUR_USER/GTNH-OC-Space-Miner"

  configTemplate: |
    -- Space Miner controller configuration.
    -- Generated by the web configurator. Edit values and restart the program.

    return {

        -- Auto-update: GitHub repo ("owner/name") and release archive name.
        update_repo    = "<field>update_repo</field>",
        update_archive = "<field>update_archive</field>",

        -- Timing
        me_scan_interval  = <field>me_scan_interval</field>,
        idle_sleep        = <field>idle_sleep</field>,

        -- Redstone item flow
        redstone_on       = <field>redstone_on</field>,
        drain_time        = <field>drain_time</field>,

        -- Drone handshake
        drone_load_time   = <field>drone_load_time</field>,
        drone_poll        = <field>drone_poll</field>,

        -- Drone buffer chest
        drone_settle_time = <field>drone_settle_time</field>,

        -- Search (auto-detection)
        search_stock_time = <field>search_stock_time</field>,
        search_start_time = <field>search_start_time</field>,

        -- Paths
        miners_config = "<field>miners_config</field>",

        -- Debug
        debug = <field>debug</field>,

        -- Ore targets (overlaid onto the asteroid catalog by label at startup)
        ore_targets = {
            <field>ore_targets</field>
        },

    }

  fieldGroups:
    - key: update
      name: "Auto-update"
      description: "Where the program pulls new releases from."
      defaultOpen: false
      fields:
        - key: update_repo
          type: string
          label: "GitHub repository"
          description: 'Repo in "owner/name" form that hosts releases and version.lua.'
          default: "YOUR_USER/GTNH-OC-Space-Miner"
        - key: update_archive
          type: string
          label: "Release archive name"
          description: 'Release .tar name without extension (e.g. "SpaceMiner").'
          default: "SpaceMiner"

    - key: timing
      name: "Timing"
      description: "Scan and idle cadence."
      defaultOpen: true
      fields:
        - key: me_scan_interval
          type: integer
          label: "ME scan interval (seconds)"
          description: "How often to scan the ME network for ore amounts."
          default: 60
          min: 1
        - key: idle_sleep
          type: integer
          label: "Idle sleep (seconds)"
          description: "How long to sleep when all targets are met and no miner is busy."
          default: 300
          min: 1

    - key: redstone
      name: "Redstone item flow"
      description: "Controls the pipe that feeds each miner's Input Bus."
      defaultOpen: false
      fields:
        - key: redstone_on
          type: integer
          label: "Redstone signal strength"
          description: "Strength emitted to enable item flow (1-15)."
          default: 15
          min: 1
          max: 15
        - key: drain_time
          type: integer
          label: "Bus drain time (seconds)"
          description: "Wait for the Input Bus to drain back before reusing a miner."
          default: 4
          min: 1

    - key: drone
      name: "Drone handshake"
      description: "Bounds the wait for a miner to pick up its drone."
      defaultOpen: false
      fields:
        - key: drone_load_time
          type: integer
          label: "Drone load timeout (seconds)"
          description: "Max wait for a miner to activate after its drone is injected."
          default: 6
          min: 1
        - key: drone_poll
          type: float
          label: "Activation poll interval (seconds)"
          description: "How often to check whether the miner has started."
          default: 0.05
          min: 0.01
          step: 0.01

    - key: drone_buffer
      name: "Drone buffer chest"
      description: "Timing for moving drones via the transposer."
      defaultOpen: false
      fields:
        - key: drone_settle_time
          type: float
          label: "AE2 settle time (seconds)"
          description: "Wait for AE2 to import/export a drone through the interface."
          default: 1.5
          min: 0.1
          step: 0.1

    - key: search
      name: "Search (auto-detection)"
      description: "Timing for the one-time hardware discovery pass."
      defaultOpen: false
      fields:
        - key: search_stock_time
          type: integer
          label: "Stock time (seconds)"
          description: "Wait for AE2 to stock an interface during search."
          default: 3
          min: 1
        - key: search_start_time
          type: integer
          label: "Start time (seconds)"
          description: "Wait for a miner to activate during search."
          default: 4
          min: 1

    - key: paths
      name: "Paths"
      defaultOpen: false
      fields:
        - key: miners_config
          type: string
          label: "Miner topology file"
          description: "Where auto-detected hardware is saved. Delete it to re-detect."
          default: "/home/miners.lua"

    - key: debug
      name: "Debug"
      defaultOpen: false
      fields:
        - key: debug
          type: boolean
          class: switch
          label: "Verbose debug output"
          description: "Print state transitions, scheduler scores and scan results."
          default: false

    - key: ores
      name: "Ore targets"
      description: >-
        The ores to keep stocked. Only ores listed here are mined. Label must
        match an in-game item name from the asteroid catalog (ores.lua).
      defaultOpen: true
      fields:
        - key: ore_targets
          type: objectList
          label: "Ores"
          description: "Add one entry per ore you want mined."
          itemLabel: "Ore"
          useSpaces: true
          objectTemplate: |
            { label = "<field>label</field>", target = <field>target</field>, priority = <field>priority</field> },
          fields:
            - key: label
              type: string
              label: "Ore label"
              description: 'Exact in-game item name, e.g. "Lithium Dust".'
            - key: target
              type: integer
              label: "Target amount"
              description: "Minimum amount to keep in the ME network."
              default: 1000000
              min: 0
            - key: priority
              type: integer
              label: "Priority"
              description: "Urgency weight; higher is mined first when depleted."
              default: 10
              min: 0
